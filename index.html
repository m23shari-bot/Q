<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الاستثمار الاحترافي | Vision Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8f9fa; }
        .tab-content { display: none; }
        .active-tab { display: block; }
        .card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="pb-24">

    <div id="user-view" class="tab-content active-tab p-4 pt-10">
        <div class="max-w-md mx-auto">
            <h1 class="text-center font-black text-2xl mb-8 text-gray-800">نظام استعلام الأرباح</h1>
            
            <div class="card p-6 bg-slate-900 text-white shadow-xl">
                <label class="block text-xs text-slate-400 mb-2">رقم الآيبان الخاص بك (IBAN)</label>
                <input type="text" id="uIban" placeholder="أدخل الرقم هنا..." 
                       class="w-full p-4 rounded-xl text-black outline-none mb-4 text-right">
                <button onclick="checkUser()" id="btnCheck" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold transition-all">
                    استعلام الآن
                </button>
            </div>

            <div id="resultBox" class="hidden mt-6 animate-fade-in space-y-4">
                <div class="card p-6 border-r-8 border-blue-500">
                    <h3 id="rName" class="font-bold text-xl text-gray-800">---</h3>
                    <p id="rWallet" class="text-sm text-blue-600 mt-2 font-mono"></p>
                </div>
                <div class="card p-6 bg-green-50 border-r-8 border-green-500 flex justify-between items-center">
                    <div>
                        <p class="text-xs text-gray-500">الأرباح المستحقة</p>
                        <h2 id="rEarn" class="text-2xl font-black text-green-600">---</h2>
                    </div>
                    <div class="text-left">
                        <p class="text-xs text-gray-400">الرسوم الإدارية</p>
                        <p id="rFees" class="font-bold text-red-500">---</p>
                    </div>
                </div>
                <button class="w-full bg-black text-white py-4 rounded-xl font-bold shadow-lg">تنشيط السحب الآن</button>
            </div>
        </div>
    </div>

    <div id="admin-view" class="tab-content p-4 pt-10">
        <div class="max-w-md mx-auto">
            <h2 class="font-bold text-xl mb-6 text-gray-800">إضافة أو تعديل بيانات مستثمر</h2>
            <div class="card p-6 space-y-4">
                <input type="text" id="aName" placeholder="الاسم الكامل للمشترك" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <input type="text" id="aIban" placeholder="رقم الآيبان (IBAN)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="aEarn" placeholder="الأرباح" class="p-3 bg-gray-50 border rounded-xl outline-none">
                    <input type="number" id="aFees" placeholder="الرسوم" class="p-3 bg-gray-50 border rounded-xl outline-none">
                </div>
                <input type="text" id="aWType" placeholder="نوع المحفظة (STC Pay, Binance...)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <input type="text" id="aWAddr" placeholder="رقم أو عنوان المحفظة" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                <button onclick="saveToCloud()" id="btnSave" class="w-full bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg">حفظ البيانات سحابياً</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 z-50">
        <button onclick="switchTab('user-view')" class="text-blue-600 font-bold text-sm">واجهة المستثمر</button>
        <button onclick="switchTab('admin-view')" class="text-gray-400 font-bold text-sm">لوحة الإدارة</button>
    </nav>

    <script>
        // ==========================================
        // 1. ضع بياناتك هنا ليربط الموقع مع الجدول
        // ==========================================
        const PROJECT_URL = 'ضع_رابط_المشروع_هنا'; 
        const API_KEY = 'ضع_مفتاح_API_هنا';
        // ==========================================

        const supabaseClient = supabase.createClient(PROJECT_URL, API_KEY);

        // وظيفة التبديل بين الصفحات
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active-tab'));
            document.getElementById(tabId).classList.add('active-tab');
        }

        // وظيفة البحث للمستثمر
        async function checkUser() {
            const ibanValue = document.getElementById('uIban').value;
            const btn = document.getElementById('btnCheck');
            
            if(!ibanValue) return alert("يرجى إدخال الآيبان");
            
            btn.innerText = "جاري البحث...";
            btn.disabled = true;

            const { data, error } = await supabaseClient
                .from('subscribers')
                .select('*')
                .eq('iban', ibanValue)
                .single();

            if (data) {
                document.getElementById('rName').innerText = data.full_name;
                document.getElementById('rWallet').innerText = data.wallet_type + ": " + data.wallet_address;
                document.getElementById('rEarn').innerText = data.total_earnings.toLocaleString() + " ر.س";
                document.getElementById('rFees').innerText = data.fees_due.toLocaleString() + " ر.س";
                document.getElementById('resultBox').classList.remove('hidden');
            } else {
                alert("رقم الآيبان غير مسجل أو توجد مشكلة في البيانات");
            }
            btn.innerText = "استعلام الآن";
            btn.disabled = false;
        }

        // وظيفة الحفظ للمدير (أنت)
        async function saveToCloud() {
            const btn = document.getElementById('btnSave');
            const investorData = {
                full_name: document.getElementById('aName').value,
                iban: document.getElementById('aIban').value,
                total_earnings: parseFloat(document.getElementById('aEarn').value),
                fees_due: parseFloat(document.getElementById('aFees').value),
                wallet_type: document.getElementById('aWType').value,
                wallet_address: document.getElementById('aWAddr').value
            };

            if(!investorData.iban || !investorData.full_name) return alert("أكمل الاسم والآيبان");

            btn.innerText = "جاري الحفظ...";
            btn.disabled = true;

            const { error } = await supabaseClient
                .from('subscribers')
                .upsert([investorData], { onConflict: 'iban' });

            if (!error) {
                alert("تم حفظ البيانات بنجاح!");
                document.querySelectorAll('#admin-view input').forEach(i => i.value = '');
            } else {
                alert("حدث خطأ أثناء الحفظ، تأكد من إعدادات الجدول");
                console.log(error);
            }
            btn.innerText = "حفظ البيانات سحابياً";
            btn.disabled = false;
        }
    </script>
</body>
</html>
